<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome – Irai Yoga</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          sage: { 50:'#f2f7f2',100:'#e2efe2',200:'#c4dfc3',300:'#9dc89b',400:'#6daa6a',500:'#4a8c47',600:'#387035',700:'#2d5a2b',800:'#254924',900:'#1e3b1d' },
          cream:{ 50:'#fdfcf8',100:'#faf7f0',200:'#f4ede0' },
        },
        fontFamily: {
          serif: ['"Cormorant Garamond"','serif'],
          sans:  ['"DM Sans"','sans-serif'],
        },
        boxShadow: {
          'card':  '0 2px 16px 0 rgba(0,0,0,0.06), 0 1px 4px 0 rgba(0,0,0,0.04)',
          'btn':   '0 4px 16px -2px rgba(74,140,71,0.40)',
        }
      }}
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #e8ede8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; }

    /* ── Phone shell (same as index) ── */
    .phone {
      width: 390px; min-width: 390px; max-width: 390px;
      min-height: 100vh;
      background: #f2f7f2;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 430px) {
      body { background: #f2f7f2; }
      .phone { width: 100vw; min-width: unset; max-width: 100vw; }
    }

    /* ── Grain (same as index) ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      opacity: .5;
    }

    /* ── Blobs (same as index) ── */
    .blob { position: fixed; border-radius: 9999px; filter: blur(60px); pointer-events: none; z-index: 0; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 2px 16px 0 rgba(0,0,0,0.06), 0 1px 4px 0 rgba(0,0,0,0.04);
      border: 1px solid rgba(196,223,195,0.4);
    }

    /* ── Input ── */
    .input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border-radius: 14px;
      border: 1px solid #e2efe2;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      background: #f2f7f2;
      color: #1e3b1d;
      transition: all .2s;
      outline: none;
    }
    .input::placeholder { color: #9dc89b; }
    .input:focus {
      border-color: #4a8c47;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(157,200,155,0.45);
    }

    /* ── Button ── */
    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 14px;
      background: #4a8c47;
      color: white;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: all .2s ease;
      box-shadow: 0 4px 16px -2px rgba(74,140,71,0.40);
    }
    .btn:hover { background: #387035; }
    .btn:active { transform: scale(.97); }

    /* ── Tabs ── */
    .tab {
      flex: 1;
      text-align: center;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      border-radius: 12px;
      cursor: pointer;
      transition: all .25s ease;
      border: none;
      background: transparent;
    }
    .tab.active {
      background: #4a8c47;
      color: white;
      box-shadow: 0 4px 12px rgba(74,140,71,0.30);
    }
    .tab.inactive { color: #6b7280; }

    /* ── Google btn ── */
    .btn-google {
      width: 100%;
      padding: 11px;
      border-radius: 14px;
      border: 1px solid #e2efe2;
      background: #fff;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      color: #2d5a2b;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: all .2s ease;
    }
    .btn-google:hover { background: #f2f7f2; border-color: #9dc89b; }

    /* ── Eye toggle ── */
    .eye-btn {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      background: none;
      border: none;
      color: #9dc89b;
      display: flex;
      padding: 0;
      transition: color .2s;
    }
    .eye-btn:hover { color: #4a8c47; }

    /* ── Field icon ── */
    .field-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #9dc89b;
      pointer-events: none;
      transition: color .2s;
    }
    .field-wrap:focus-within .field-icon { color: #4a8c47; }

    /* ── Eyebrow ── */
    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #6daa6a;
    }

    /* ── Fade up ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .fu  { animation: fadeUp .5s ease both; }
    .d1  { animation-delay: .06s; }
    .d2  { animation-delay: .12s; }
    .d3  { animation-delay: .18s; }
    .d4  { animation-delay: .24s; }

    /* ── Avatar ring (logo) ── */
    .logo-ring { background: linear-gradient(135deg, #9dc89b 0%, #4a8c47 100%); }

    .hidden { display: none !important; }

    /* ── Hero ── */
    .hero { margin-bottom: 24px; }

    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .eyebrow-line {
      width: 24px;
      height: 1.5px;
      background: #6daa6a;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .eyebrow-text {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6daa6a;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 700;
      color: #1e3b1d;
      line-height: 1.05;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .italic-accent {
      font-style: italic;
      color: #4a8c47;
    }

    .underline-gold {
      position: relative;
      display: inline-block;
    }

    .underline-gold::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 1px;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, #6daa6a, transparent);
      border-radius: 2px;
      opacity: 0.7;
    }

    .hero p {
      font-size: 13px;
      line-height: 1.65;
      color: rgba(45,90,43,0.6);
      font-weight: 300;
      max-width: 260px;
    }
  </style>
</head>

<body>

  <!-- Blobs — identical positions to index.html -->
  <div class="blob w-72 h-72 top-0 right-0 -translate-y-1/4 translate-x-1/4" style="background:#c4dfc3;opacity:.50;"></div>
  <div class="blob w-56 h-56 bottom-32 left-0 -translate-x-1/3" style="background:#e2efe2;opacity:.60;"></div>

  <div class="phone relative z-10 px-6 pt-12 pb-12">

    <!-- ── HEADER ── -->
    <header class="flex items-center justify-between mb-6 fu">
      <div>
        <p class="eyebrow mb-1">Welcome ✦</p>
        <h1 class="text-[2rem] font-bold text-sage-900 leading-none tracking-tight">
          Irai <span class="text-sage-500 italic">Yoga</span>
        </h1>
      </div>
      <!-- Logo mark -->
      <div class="flex-shrink-0">
        <div class="logo-ring w-12 h-12 rounded-2xl p-[2px] shadow-lg">
          <div class="w-full h-full rounded-xl bg-sage-50 flex items-center justify-center">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M12 20C12 20 5 15 5 9C5 6.24 7.24 4 10 4C10.9 4 11.75 4.25 12.47 4.68C13.19 4.25 14.09 4 15 4C17.76 4 20 6.24 20 9C20 15 12 20 12 20Z" fill="#4a8c47"/>
              <path d="M12 20C12 20 7 17 6.5 11.5C8.5 13 10.5 14 12 14C13.5 14 15.5 13 17.5 11.5C17 17 12 20 12 20Z" fill="#9dc89b"/>
            </svg>
          </div>
        </div>
      </div>
    </header>

    <!-- ── HERO ── -->
    <div class="hero fu d1">
      <div class="hero-eyebrow">
        <div class="eyebrow-line"></div>
        <span class="eyebrow-text">Begin Your Practice</span>
      </div>
      <h1>
        Find Your <span class="italic-accent underline-gold">Inner</span> Balance.
      </h1>
      <p>Align your body, calm your mind, and begin your healing journey with personalised guidance.</p>
    </div>

    <!-- ── CARD ── -->
    <div class="card p-5 fu d1">

      <!-- Tabs -->
      <div class="flex gap-2 mb-5 p-1 rounded-xl" style="background:#f2f7f2;">
        <button id="loginTab" class="tab active" onclick="switchTab('login')">Login</button>
        <button id="signupTab" class="tab inactive" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Fields -->
      <div class="flex flex-col gap-3 mb-4">

        <!-- Name (signup only) -->
        <div id="nameWrap" class="field-wrap relative hidden">
          <input id="nameField" type="text" placeholder="Full Name" class="input"/>
          <span class="field-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </span>
        </div>

        <!-- Email -->
        <div class="field-wrap relative">
          <input type="email" placeholder="Email address" class="input"/>
          <span class="field-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </span>
        </div>

        <!-- Password -->
        <div class="field-wrap relative">
          <input id="passwordField" type="password" placeholder="Password" class="input" style="padding-right:42px;"/>
          <span class="field-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
          </span>
          <button class="eye-btn" onclick="togglePassword()" type="button">
            <svg id="eyeOpen" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg id="eyeClosed" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="hidden">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>

      </div>

      <!-- Forgot -->
      <p id="forgotWrap" class="text-right text-[11.5px] text-sage-500 font-medium cursor-pointer hover:text-sage-700 transition-colors mb-4">Forgot password?</p>

      <!-- CTA -->
      <button type="button" class="btn" id="actionBtn" onclick="redirectHome()">Login</button>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-4">
        <div class="flex-1 h-px bg-sage-100"></div>
        <span class="text-[11px] font-semibold tracking-widest text-sage-400 uppercase">or</span>
        <div class="flex-1 h-px bg-sage-100"></div>
      </div>

      <!-- Google -->
      <button type="button" class="btn-google">
        <svg width="17" height="17" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <!-- Switch -->
      <p class="text-center text-[12px] text-sage-600 mt-4">
        <span id="switchText">Don't have an account?</span>
        <span class="text-sage-500 font-semibold cursor-pointer hover:text-sage-700 transition-colors" onclick="toggleMode()">
          <span id="switchLink"> Sign up</span>
        </span>
      </p>

    </div>

    <!-- Trust pills -->
    <div class="flex gap-4 justify-center mt-6 fu d3">
      <div class="flex items-center gap-1.5 text-[11px] text-sage-500">
        <span class="w-1.5 h-1.5 rounded-full bg-sage-400 inline-block"></span>2,400+ students
      </div>
      <div class="flex items-center gap-1.5 text-[11px] text-sage-500">
        <span class="w-1.5 h-1.5 rounded-full bg-sage-400 inline-block"></span>50+ classes
      </div>
      <div class="flex items-center gap-1.5 text-[11px] text-sage-500">
        <span class="w-1.5 h-1.5 rounded-full bg-sage-400 inline-block"></span>Free trial
      </div>
    </div>

  </div><!-- /phone -->

  <script>
    let mode = 'login';

    function switchTab(tab) {
      mode = tab;
      const loginTab   = document.getElementById('loginTab');
      const signupTab  = document.getElementById('signupTab');
      const nameWrap   = document.getElementById('nameWrap');
      const btn        = document.getElementById('actionBtn');
      const switchText = document.getElementById('switchText');
      const switchLink = document.getElementById('switchLink');
      const forgotWrap = document.getElementById('forgotWrap');

      if (tab === 'login') {
        loginTab.classList.add('active');   loginTab.classList.remove('inactive');
        signupTab.classList.add('inactive'); signupTab.classList.remove('active');
        nameWrap.classList.add('hidden');
        forgotWrap.style.display = 'block';
        btn.textContent = 'Login';
        switchText.textContent = "Don't have an account?";
        switchLink.textContent = ' Sign up';
      } else {
        signupTab.classList.add('active');   signupTab.classList.remove('inactive');
        loginTab.classList.add('inactive');  loginTab.classList.remove('active');
        nameWrap.classList.remove('hidden');
        forgotWrap.style.display = 'none';
        btn.textContent = 'Create Account';
        switchText.textContent = 'Already have an account?';
        switchLink.textContent = ' Login';
      }
    }

    function toggleMode() {
      switchTab(mode === 'login' ? 'signup' : 'login');
    }

    function togglePassword() {
      const input = document.getElementById('passwordField');
      const eyeOpen = document.getElementById('eyeOpen');
      const eyeClosed = document.getElementById('eyeClosed');
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      eyeOpen.classList.toggle('hidden', isPass);
      eyeClosed.classList.toggle('hidden', !isPass);
    }

    function redirectHome() {
      window.location.href = 'onboarding.html';
    }
  </script>

</body>
</html>
